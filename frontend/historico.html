<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Histórico - TB Predict
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <!-- ESQUERDA -->
    <div class="nav-left">

      🫁 TB Predict

    </div>

    <!-- CENTRO -->
    <div class="nav-center-links">

      <a href="index.html">

        Predição

      </a>

      <a
        href="historico.html"
        class="active"
      >

        Histórico

      </a>

    </div>

    <!-- DIREITA -->
    <div class="nav-right">

      <span
        class="theme-text"
        id="themeText"
      >

        ☀️ Claro

      </span>

      <label class="switch">

        <input
          type="checkbox"
          id="themeToggle"
        >

        <span class="slider"></span>

      </label>

    </div>

  </nav>

  <!-- CONTAINER -->
  <div class="history-container">

    <h1>

      Histórico de Pacientes

    </h1>

    <!-- FILTROS -->
    <div class="filters">

      <select id="sortType">

        <option value="recentes">
          Ordem de Adição
        </option>

        <option value="az">
          Nome (A → Z)
        </option>

        <option value="za">
          Nome (Z → A)
        </option>

        <option value="probAsc">
          Probabilidade (Menor → Maior)
        </option>

        <option value="probDesc">
          Probabilidade (Maior → Menor)
        </option>

      </select>

    </div>

    <!-- AÇÕES -->
    <div class="history-actions">

      <div class="right-actions">

        <button id="deleteSelected">

          Selecionar Todos

        </button>

        <button id="deleteAll">

          Limpar Histórico

        </button>

      </div>

    </div>

    <!-- LISTA -->
    <div id="historyList"></div>

  </div>

  <script>

    /* ====================================== */
    /* HISTÓRICO */
    /* ====================================== */

    let historico = [];

    const historyList =
      document.getElementById("historyList");

    const sortType =
      document.getElementById("sortType");

    let todosSelecionados = false;

    /* ====================================== */
    /* RENDER */
    /* ====================================== */

    function renderHistorico(lista) {

      historyList.innerHTML = "";

      lista.forEach((record, index) => {

        const card =
          document.createElement("div");

        card.className =
          "history-card";

        card.innerHTML = `

          <!-- CHECKBOX -->
          <div class="card-checkbox">

            <input
              type="checkbox"
              class="select-card"
              data-index="${index}"
              data-id="${record.id}"
            >

          </div>

          <!-- HEADER -->
          <div class="history-header">

            <div>

              <h2>
                ${record.patient.NOME}
              </h2>

              <p>
                <strong>CPF:</strong>
                ${record.patient.CPF}
              </p>

              <p>
                <strong>Probabilidade:</strong>
                ${record.result.PROBABILIDADE}%
              </p>

              <p>
                <strong>Classificação:</strong>
                ${record.result.CLASSIFICACAO}
              </p>

              <p>
                <strong>Modelo:</strong>
                ${record.model?.name || record.model?.id || 'Desconhecido'}
              </p>

            </div>

          </div>

          <!-- DETALHES -->
          <div
            class="history-details"
            id="details-${index}"
          >

            <p>
              <strong>Data:</strong>
              ${record.timestamp}
            </p>

            ${Object.entries(record.exam_data)
              .map(([campo, valor]) => `

                <p>

                  <strong>${campo}:</strong>

                  ${valor}

                </p>

              `).join("")}

          </div>

          <!-- FOOTER -->
          <div class="card-footer">

            <button
              class="info-btn"
              data-index="${index}"
              onclick="toggleInfo(${index})"
            >

              Mais info.

            </button>

          </div>

        `;

        historyList.appendChild(card);

      });

    }

    /* ====================================== */
    /* TOGGLE INFO */
    /* ====================================== */

    function toggleInfo(index) {
      const details = document.getElementById(`details-${index}`);
      const card = details.closest('.history-card');
      const button = card.querySelector('.info-btn');

      const isShown = details.classList.toggle('show');
      button.textContent = isShown ? 'Menos info.' : 'Mais info.';
    }

    /* ====================================== */
    /* FILTROS */
    /* ====================================== */

    sortType.addEventListener("change", () => {

      let copia =
        [...historico];

      switch(sortType.value) {

        case "az":

          copia.sort((a, b) =>
            a.patient.NOME.localeCompare(b.patient.NOME)
          );

        break;

        case "za":

          copia.sort((a, b) =>
            b.patient.NOME.localeCompare(a.patient.NOME)
          );

        break;

        case "probAsc":

          copia.sort((a, b) =>
            a.result.PROBABILIDADE - b.result.PROBABILIDADE
          );

        break;

        case "probDesc":

          copia.sort((a, b) =>
            b.result.PROBABILIDADE - a.result.PROBABILIDADE
          );

        break;

        default:

          copia =
            [...historico];

      }

      renderHistorico(copia);

    });

    /* ====================================== */
    /* SELECIONAR TODOS */
    /* ====================================== */

    document
      .getElementById("deleteSelected")
      .addEventListener("click", () => {

        const checks =
          document.querySelectorAll(
            ".select-card"
          );

        todosSelecionados =
          !todosSelecionados;

        checks.forEach((check) => {

          check.checked =
            todosSelecionados;

        });

        document
          .getElementById("deleteSelected")
          .textContent =
            todosSelecionados
              ? "Desmarcar Todos"
              : "Selecionar Todos";

    });

    /* ====================================== */
    /* REMOVER SELECIONADOS */
    /* ====================================== */

    document
      .getElementById("deleteAll")
      .addEventListener("click", () => {

        const checks =
          document.querySelectorAll(
            ".select-card"
          );

        const selecionados =
          [...checks]
            .filter(check => check.checked);

        let idsToDelete = [];

        if (selecionados.length === 0) {
          const confirmarLimparTudo = confirm(
            "Nenhum paciente selecionado. Deseja limpar todo o histórico?"
          );

          if (!confirmarLimparTudo) return;
          idsToDelete = historico.map(record => record.id);
        } else {
          const confirmar =
            confirm(
              "Deseja remover os pacientes selecionados?"
            );

          if (!confirmar) return;
          idsToDelete = selecionados.map(check => check.dataset.id);
        }

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);

        fetch('/api/exam/history/delete', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ ids: idsToDelete }),
          signal: controller.signal
        })
          .then(response => {
            clearTimeout(timeoutId);
            if (!response.ok) {
              return response.json().then(err => Promise.reject(err));
            }
            return response.json();
          })
          .then(updatedHistory => {
            historico = updatedHistory;
            renderHistorico(historico);
            todosSelecionados = false;
            document
              .getElementById("deleteSelected")
              .textContent =
                "Selecionar Todos";
            alert('Registros removidos com sucesso.');
          })
          .catch(error => {
            clearTimeout(timeoutId);
            console.error(error);
            if (error.name === 'AbortError') {
              alert('Conexão expirou ao remover registros.');
            } else {
              alert('Erro ao remover registros: ' + (error.error || error.message || 'Erro desconhecido'));
            }
          });
    });

    /* ====================================== */
    /* CARREGA HISTÓRICO */
    /* ====================================== */

    function loadHistory() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);

      fetch('/api/exam/history', { signal: controller.signal })
        .then(response => {
          clearTimeout(timeoutId);
          if (!response.ok) {
            throw new Error(`Erro ${response.status}: Não foi possível carregar o histórico`);
          }
          return response.json();
        })
        .then(records => {
          historico = records;
          renderHistorico(historico);
        })
        .catch(error => {
          clearTimeout(timeoutId);
          console.error('Erro ao carregar histórico:', error);
          if (error.name === 'AbortError') {
            alert('Conexão expirou ao carregar histórico.');
          } else {
            alert(`Erro ao carregar histórico: ${error.message}`);
          }
          historico = [];
          renderHistorico(historico);
        });
    }

    loadHistory();

    /* ====================================== */
    /* DARK MODE GLOBAL */
    /* ====================================== */

    const themeToggle =
      document.getElementById("themeToggle");

    const themeText =
      document.getElementById("themeText");

    const temaSalvo =
      localStorage.getItem("theme");

    if (temaSalvo === "dark") {

      document.body.classList.add(
        "dark-mode"
      );

      themeToggle.checked = true;

      themeText.textContent =
        "🌙 Escuro";

    }

    themeToggle.addEventListener("change", () => {

      if (themeToggle.checked) {

        document.body.classList.add(
          "dark-mode"
        );

        localStorage.setItem(
          "theme",
          "dark"
        );

        themeText.textContent =
          "🌙 Escuro";

      } else {

        document.body.classList.remove(
          "dark-mode"
        );

        localStorage.setItem(
          "theme",
          "light"
        );

        themeText.textContent =
          "☀️ Claro";

      }

    });

    /* ====================================== */

    renderHistorico(historico);

  </script>

</body>

</html>
